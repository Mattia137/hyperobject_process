<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaussian Site Model</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Fragment Mono', monospace;
        }

        /* Iframe performance shell */
        #splat-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        /* Persistent HUD Panel */
        #hud-overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 320px;
            background: rgba(255, 255, 255, 0.85); /* Frost backing so text is readable */
            border: 1px solid #000;
            padding: 20px;
            color: #000000;
            z-index: 20;
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Let clicks pass through to 3D model */
        }
        
        #hud-overlay h1 {
            font-size: 14px;
            font-weight: normal;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #000;
            padding-bottom: 8px;
        }

        #hud-overlay p {
            font-size: 8px;
            line-height: 1.6;
            margin-bottom: 10px;
            text-align: justify;
            text-transform: uppercase;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(0,0,0,0.3);
            padding: 4px 0;
            margin-top: 5px;
        }
        .meta-label { font-size: 7px; opacity: 0.5; }
        .meta-value { font-size: 8px; font-weight: bold; }
        
    </style>
</head>
<body>

    <!-- 3D Overlay Context -->
    <div id="hud-overlay">
        <h1>SITE SCAN DATA</h1>
        <p>Volumetric Capture Output</p>
        <p>Three-dimensional point cloud environment captured globally via photogrammetric extraction. Rendering handled natively via embedded Gaussian Splat viewport.</p>
        
        <div class="meta-row"><span class="meta-label">SOURCE ID</span><span class="meta-value">424A31FC</span></div>
        <div class="meta-row"><span class="meta-label">TARGET FPS</span><span class="meta-value">25.0</span></div>
        <div class="meta-row"><span class="meta-label">PIPELINE</span><span class="meta-value">SUPERSPLAT ENGINE</span></div>
    </div>

    <!-- 3D Environment Wrapper -->
    <div id="splat-container">
        <!-- Embedded directly from Supersplat API -->
        <iframe id="viewer" allow="fullscreen; xr-spatial-tracking" src="https://superspl.at/s?id=424a31fc"></iframe>
    </div>

</body>
</html>
