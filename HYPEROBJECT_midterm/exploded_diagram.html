<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STRUCTURAL_ANALYSIS // 260303</title>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        /* THICK BLACK + CROSSHAIR CURSOR - LOCKED GLOBAL */
        * { cursor: none !important; }
        #custom-cursor {
            position: fixed; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
        }
        #custom-cursor::before, #custom-cursor::after {
            content: ''; position: absolute; background: #000;
        }
        #custom-cursor::before { width: 16px; height: 3px; left: -8px; top: -1.5px; }
        #custom-cursor::after { width: 3px; height: 16px; left: -1.5px; top: -8px; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Fragment Mono', monospace; color: #000; }
        canvas { width: 100%; height: 100%; outline: none; }
        
        #interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none; text-transform: uppercase; font-size: 8px; letter-spacing: 0.25em;
        }
        .hud-element { position: absolute; }
        .t-l { top: 40px; left: 40px; }
        .b-l { bottom: 40px; left: 40px; }
        .b-r { bottom: 40px; right: 40px; text-align: right; }

        #system-nav { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); z-index: 30; pointer-events: all; }
        .nav-btn { 
            display: block; width: 160px; padding: 12px; margin-bottom: 8px; 
            border: 1px solid #000; background: transparent; color: #000; 
            font-family: 'Fragment Mono', monospace; font-size: 8px; text-align: left; 
            transition: 0.2s; outline: none;
        }
        .nav-btn.active { background: #000; color: #fff; }

        #desc-box { 
            position: absolute; right: 40px; top: 50%; transform: translateY(-50%); 
            width: 220px; font-size: 9px; line-height: 1.8; text-align: right; opacity: 0; transition: 0.3s;
        }
        
        #scrubber-box {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 400px; z-index: 20; padding: 10px 0;
        }
        input[type=range] { 
            width: 100%; appearance: none; background: rgba(0,0,0,0.1); height: 1px; outline: none; 
        }
        input[type=range]::-webkit-slider-thumb { 
            appearance: none; width: 40px; height: 2px; background: #000; 
            border-radius: 0; transition: height 0.2s;
        }
        input[type=range]:hover::-webkit-slider-thumb { height: 10px; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="system-nav">
        <button class="nav-btn" data-id="structure">STRUCTURE</button>
        <button class="nav-btn" data-id="interiors">INTERIOR SPACES</button>
        <button class="nav-btn" data-id="circulation">CIRCULATION</button>
        <button class="nav-btn" data-id="machinary">MACHINERY</button>
        <button class="nav-btn" data-id="media">MEDIA</button>
    </div>

    <div id="desc-box"></div>

    <div id="interface">
        <div class="hud-element t-l">REF: 260303_PERF_OPTIMIZED<br>LENS: 100MM_F_1.8_MONO</div>
        <div class="hud-element b-l">COORD_SYS: <span id="coord-val">0.00 // 0.00</span><br>NAV: LEFT_CLICK_ROTATION</div>
        <div class="hud-element b-r">HYPEROBJECT<br>ASSEMBLY INSTRUCTIONS</div>
    </div>

    <div id="scrubber-box">
        <input type="range" id="animSlider" min="0" max="100" value="0">
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        // ================================================================
        // PARAMETER BLOCK - PRESERVED AS REQUESTED
        // ================================================================
        const PARAMS = {
            location: { 
                verticalOffset: -15.0, yOffset: 0.0, xOffset: 0.0,
                rotationX: 0.0, rotationY: 1.5, rotationZ: 0.0, scale: 1.0 
            },
            camera: { 
                pivotX: 0.0, pivotY: -12.0, pivotZ: 0.0,
                focalLength: 100, radius: 40, alpha: 3.2, beta: 1.25 
            },
            materials: {
                roughness: 0.7, metallic: 1.0, alpha: 0.2, 
                transmission: 0.5, ior: 1.0, envIntensity: 1.4,
            },
            wireframe: {
                bodyColor: new BABYLON.Color3(0, 0, 0),
                wireColor: new BABYLON.Color3(1, 1, 1),
                wireWidth: 0.2,
                zDepthOffset: 4
            },
            post: { 
                exposure: 0.8, contrast: 1.5, 
                blurStrength: 0.05,
                focusRadius: 0.35          
            }
        };

        const descriptions = {
            structure: "PRIMARY HEA-BEAM SKELETON. ENGINEERED FOR HIGH-TENSION LOAD DISTRIBUTION.",
            interiors: "EXHIBITION SPACES - IMMERSIVE ROOMS - THEATER - FOOD AREA.",
            circulation: "VERTICAL AND HORIZONTAL ACCESS ARTERIES. CORE CONNECTIVITY BETWEEN LAYERS.",
            machinary: "DATA CENTER - TECHNICAL EQUIPMENT AND COOLING SYSTEM.",
            media: "KINETIC MEDIA ENVELOPE. DYNAMIC SURFACE FOR EXTERNAL COMMUNICATION AND LIGHT CONTROL."
        };

        const fileNames = [
            '260303_3dmod_exploded-structure.glb',
            '260303_3dmod_exploded-interiors.glb',
            '260303_3dmod_exploded-circulation.glb',
            '260303_3dmod_exploded-machinary.glb',
            '260303_3dmod_exploded-media.glb' // Added New File
        ];

        const modelGroups = {};
        let allAnimations = [];
        const canvas = document.getElementById("renderCanvas");
        const cursor = document.getElementById('custom-cursor');
        
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        const init = () => {
            const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(1, 1, 1, 1);

            const pivotTarget = new BABYLON.Vector3(PARAMS.camera.pivotX, PARAMS.camera.pivotY, PARAMS.camera.pivotZ);
            const camera = new BABYLON.ArcRotateCamera("camera", PARAMS.camera.alpha, PARAMS.camera.beta, PARAMS.camera.radius, pivotTarget, scene);
            camera.attachControl(canvas, true);
            camera.inputs.attached.pointers.buttons = [0]; 
            camera.panningSensibility = 0; 
            camera.fov = 2 * Math.atan(18 / PARAMS.camera.focalLength);

            const env = BABYLON.CubeTexture.CreateFromPrefilteredData("https://assets.babylonjs.com/environments/studio.env", scene);
            scene.environmentTexture = env;
            scene.environmentIntensity = PARAMS.materials.envIntensity;

            BABYLON.Effect.ShadersStore["tiltShiftMonoFragmentShader"] = `
                varying vec2 vUV;
                uniform sampler2D textureSampler;
                uniform float focusRadius;
                uniform float blurStrength;
                void main(void) {
                    float dist = distance(vUV, vec2(0.5, 0.5));
                    float b = smoothstep(focusRadius, focusRadius + 0.6, dist) * blurStrength;
                    vec4 color = texture2D(textureSampler, vUV);
                    color += texture2D(textureSampler, vUV + vec2(b, b));
                    color += texture2D(textureSampler, vUV + vec2(-b, b));
                    color += texture2D(textureSampler, vUV + vec2(b, -b));
                    color += texture2D(textureSampler, vUV + vec2(-b, -b));
                    color /= 5.0;
                    float luminance = dot(color.rgb, vec3(0.299, 0.587, 0.114));
                    gl_FragColor = vec4(vec3(luminance), 1.0);
                }
            `;

            const masterNode = new BABYLON.TransformNode("masterNode", scene);
            masterNode.position.set(PARAMS.location.xOffset, PARAMS.location.verticalOffset, PARAMS.location.yOffset);
            masterNode.rotation.set(PARAMS.location.rotationX, PARAMS.location.rotationY, PARAMS.location.rotationZ);

            const loadTasks = fileNames.map(fileName => {
                const id = fileName.split('-')[1].replace('.glb', '');
                return BABYLON.SceneLoader.ImportMeshAsync("", "./", fileName, scene).then(result => {
                    const root = result.meshes[0];
                    root.parent = masterNode;
                    root.rotationQuaternion = null;
                    modelGroups[id] = result.meshes;
                    result.animationGroups.forEach(ag => { ag.stop(); allAnimations.push(ag); });

                    result.meshes.forEach(m => {
                        if (m.material) {
                            m.material.roughness = PARAMS.materials.roughness;
                            m.material.metallic = PARAMS.materials.metallic;
                            m.material.alpha = PARAMS.materials.alpha;
                            m.material.transparencyMode = 2;
                            m.material.zOffset = PARAMS.wireframe.zDepthOffset;
                            m.metadata = { originalColor: m.material.albedoColor ? m.material.albedoColor.clone() : new BABYLON.Color3(1,1,1) };
                        }
                    });
                });
            });

            Promise.all(loadTasks).then(() => {
                camera.setTarget(pivotTarget);
                
                const pipeline = new BABYLON.DefaultRenderingPipeline("pipeline", true, scene, [camera]);
                pipeline.imageProcessingEnabled = true;
                pipeline.imageProcessing.exposure = PARAMS.post.exposure;
                pipeline.imageProcessing.contrast = PARAMS.post.contrast;
                pipeline.fxaaEnabled = true;

                const post = new BABYLON.PostProcess("TSM", "tiltShiftMono", ["focusRadius", "blurStrength"], null, 1.0, camera);
                post.onApply = (eff) => {
                    eff.setFloat("focusRadius", PARAMS.post.focusRadius);
                    eff.setFloat("blurStrength", PARAMS.post.blurStrength);
                };
            });

            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const activeId = btn.getAttribute('data-id');
                    const descBox = document.getElementById('desc-box');
                    const isAlreadyActive = btn.classList.contains('active');

                    navButtons.forEach(b => b.classList.remove('active'));
                    Object.keys(modelGroups).forEach(id => {
                        modelGroups[id].forEach(m => {
                            if (!m.material) return;
                            m.renderOutline = false;
                            m.material.albedoColor = m.metadata.originalColor.clone();
                            m.material.alpha = PARAMS.materials.alpha;
                            m.material.zOffset = PARAMS.wireframe.zDepthOffset;
                        });
                    });

                    if (!isAlreadyActive) {
                        btn.classList.add('active');
                        descBox.innerText = descriptions[activeId];
                        descBox.style.opacity = 1;
                        modelGroups[activeId].forEach(m => {
                            if (!m.material) return;
                            m.renderOutline = true;
                            m.outlineWidth = PARAMS.wireframe.wireWidth;
                            m.outlineColor = PARAMS.wireframe.wireColor;
                            m.material.albedoColor = PARAMS.wireframe.bodyColor;
                            m.material.alpha = 1.0;
                            m.material.zOffset = -10;
                        });
                    } else { descBox.style.opacity = 0; }
                });
            });

            const slider = document.getElementById("animSlider");
            slider.addEventListener("input", () => {
                const ratio = slider.value / 100;
                allAnimations.forEach(ag => {
                    ag.start(); ag.pause();
                    ag.goToFrame(BABYLON.Scalar.Lerp(ag.from, ag.to, ratio));
                });
            });

            engine.runRenderLoop(() => {
                document.getElementById("coord-val").innerText = `${camera.position.x.toFixed(2)} // ${camera.position.z.toFixed(2)}`;
                scene.render();
            });
            window.addEventListener("resize", () => engine.resize());
        };

        init();
    </script>
</body>
</html>
