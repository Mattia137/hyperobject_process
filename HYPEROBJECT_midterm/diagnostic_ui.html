<!DOCTYPE html>
<html>
<head>
    <title>HYPEROBJECT - Diagnostic UI</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; font-family: 'Fragment Mono', monospace; cursor: none; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
        
        #hyperobject-meta { position: absolute; top: 40px; left: 40px; color: #ffffff; pointer-events: none; z-index: 9999; text-transform: uppercase; letter-spacing: 2px; }
        .meta-title { font-size: 24px; font-weight: bold; margin-bottom: 8px; letter-spacing: 4px; }
        .meta-sub { font-size: 11px; line-height: 1.4; opacity: 0.8; }

        #label-stack { position: fixed; pointer-events: none; display: flex; flex-direction: column; gap: 8px; z-index: 10000; }
        .label-item { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; padding: 4px 10px; border-left: 3px solid; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); transition: all 0.2s ease; }

        #desc-sidebar { position: fixed; top: 40px; right: 40px; width: 280px; display: flex; flex-direction: column; gap: 20px; pointer-events: none; z-index: 9999; }
        .desc-item { border-top: 1px solid #ffffff; padding-top: 10px; font-size: 11px; line-height: 1.5; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; }
        .desc-title { font-weight: bold; margin-bottom: 5px; font-size: 13px; }

        #ui-layer { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .mode-btn { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.2); padding: 14px 24px; cursor: none; font-family: 'Fragment Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease; text-align: left; min-width: 160px; }
        .active { background: rgba(255, 255, 255, 0.15); color: white; border-color: white; border-left-width: 5px; }

        /* CUSTOM CURSOR SYSTEM */
        #custom-cursor {
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 20000;
            display: flex; align-items: center; justify-content: center;
            transform: translate(-50%, -50%);
        }
        #cursor-square { background: #ff0000; transition: transform 0.1s ease; }
        #cursor-hint {
            position: absolute; width: 30px; height: 30px; border: 1px solid white; border-radius: 50%;
            opacity: 0; transform: scale(0.5); transition: opacity 0.3s ease;
        }
        .pulsing #cursor-hint { animation: cursorPulse 1.5s infinite ease-out; opacity: 1; }
        @keyframes cursorPulse {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor">
        <div id="cursor-hint"></div>
        <div id="cursor-square"></div>
    </div>

    <div id="hyperobject-meta">
        <div class="meta-title">HYPEROBJECT</div>
        <div class="meta-sub">MATTIA GALBUSERA, JAROSLAV HERRERA<br>2GBX - SS26 - PROGRAM DIAGRAM</div>
    </div>
    <div id="label-stack"></div>
    <div id="desc-sidebar"></div>
    <div id="ui-layer">
        <button id="btn-mass" class="mode-btn active">01_MASS_MODE</button>
        <button id="btn-program" class="mode-btn">02_PROG_MODE</button>
    </div>
    <canvas id="renderCanvas"></canvas>

    <script>
        // --- CURSOR PARAMETERS ---
        const CURSOR_SIZE = 10; 

        // --- 1. FUNCTION MAP ---
        const FUNCTION_MAP = [
            { r: 1.0, g: 0.14, b: 0.0, label: "CIRCULATION", desc: "Primary transit arteries connecting core structural nodes." },
            { r: 0.5, g: 0.0, b: 0.5, label: "RESEARCH MODULES", desc: "Laboratories for quantum biological studies and planetary transition." },
            { r: 0.0, g: 0.6, b: 1.0, label: "SYNTHETIC LANDSCAPE", desc: "Bio-domes preserving Terran DNA for Martian colonization." },
            { r: 0.0, g: 1.0, b: 0.39, label: "DATA_CENTER", desc: "Hub for bridge stability monitoring and inter-planetary data sync." },
            { r: 0.92, g: 0.0, b: 1.0, label: "IMMERSIVE_EXHIBITION", desc: "Virtual modules documenting the bridge history." },
            { r: 1.0, g: 0.88, b: 0.0, label: "PUBLIC_SPACES", desc: "Facilitating personnel well-being during bridge residence." },
            { r: 1.0, g: 0.4, b: 0.0, label: "SERVICES_FOOD AREA", desc: "Automated nutrient processing for bridge staff." },
            { r: 1.0, g: 0.73, b: 0.8, label: "EXHIBITION_SPACES", desc: "Galleries showcasing Martian architectural artifacts." },
            { r: -1, g: -1, b: -1, label: "TRANSITION_ZONE", desc: "Unspecified sector currently under diagnostic review." }
        ];

        // --- 2. LENS EFFECT PARAMETERS ---
        const MASK_RADIUS = 0.38;        
        const MASK_SOFTNESS = 0.25;      
        const CA_INTENSITY = 0.005;       
        const BLUR_INTENSITY = 3.0;      
        const VIGNETTE_INTENSITY = 0.85; 

        // --- 3. TACTICAL PARAMETERS ---
        const GLOBAL_SCALE = 0.05;
        const INITIAL_ROTATION_DEG = 45; 
        const STARTING_DISTANCE = 500;
        const MIN_ZOOM = 10;           
        const MAX_ZOOM = 1200;         
        const CAMERA_FOV_DEG = 20; 
        const WHEEL_SPEED = 3.0; 
        const DOUBLE_CLICK_ZOOM_LEVEL = 150; 
        const BUILDING_GLOW_INTENSITY = 0.025; 
        const STREET_GLOW_INTENSITY = 0.60;   
        const SITE_ALPHA = 0.030;
        const MASS_WIRE_ALPHA = 0.06; 
        const PROG_VOLUME_OPACITY = 0.15;  
        const PROG_WIRE_ALPHA = 0.15;     
        const STREET_GHOST_ALPHA = 0.09;      
        const STREET_FLOW_SPEED = 0.007;      
        const STREET_TRAIL_LENGTH = 350;     
        const STREET_TRAIL_DENSITY = 8;    
        const PROG_MODE_STREET_ALPHA = 0.1; 
        const PROG_MODE_SITE_ALPHA = 0.006; 

        const canvas = document.getElementById("renderCanvas");
        const customCursor = document.getElementById('custom-cursor');
        const cursorSquare = document.getElementById('cursor-square');
        cursorSquare.style.width = CURSOR_SIZE + 'px';
        cursorSquare.style.height = CURSOR_SIZE + 'px';

        window.addEventListener('mousemove', (e) => {
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });

        let trailTexture, streetMat, siteMat, camera;
        let isProgramMode = false;

        const createScene = async function (engine) {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0, 0, 0, 1);
            scene.useRightHandedSystem = true;

            // FIX: Restored correct camera class
            camera = new BABYLON.ArcRotateCamera("camera", Math.PI / 2, 1.2, STARTING_DISTANCE, BABYLON.Vector3.Zero(), scene);
            camera.fov = (CAMERA_FOV_DEG * Math.PI) / 180;
            camera.lowerRadiusLimit = MIN_ZOOM;
            camera.upperRadiusLimit = MAX_ZOOM;
            camera.wheelPrecision = WHEEL_SPEED; 
            camera.attachControl(canvas, true);

            BABYLON.Effect.ShadersStore["cornerLensFragmentShader"] = `
                varying vec2 vUV;
                uniform sampler2D textureSampler;
                uniform float radius;
                uniform float softness;
                uniform float aberration;
                uniform float vignette;
                uniform float blur;
                uniform vec2 screenSize;
                void main(void) {
                    vec2 dist = abs(vUV - 0.5);
                    float mask = smoothstep(radius, radius + softness, max(dist.x, dist.y));
                    vec4 col = texture2D(textureSampler, vUV);
                    if (mask > 0.01) {
                        vec4 blurCol = vec4(0.0);
                        float step = (blur / screenSize.x) * mask;
                        blurCol += texture2D(textureSampler, vUV + vec2(step, step));
                        blurCol += texture2D(textureSampler, vUV + vec2(-step, step));
                        blurCol += texture2D(textureSampler, vUV + vec2(step, -step));
                        blurCol += texture2D(textureSampler, vUV + vec2(-step, -step));
                        blurCol /= 4.0;
                        col = mix(col, blurCol, mask);
                        col.r = texture2D(textureSampler, vUV + (aberration * mask)).r;
                        col.b = texture2D(textureSampler, vUV - (aberration * mask)).b;
                    }
                    gl_FragColor = col * (1.0 - (mask * vignette));
                }
            `;

            const lensPass = new BABYLON.PostProcess("LensPass", "cornerLens", ["radius", "softness", "aberration", "vignette", "blur", "screenSize"], null, 1.0, camera);
            lensPass.onApply = (effect) => {
                effect.setFloat("radius", MASK_RADIUS);
                effect.setFloat("softness", MASK_SOFTNESS);
                effect.setFloat("aberration", CA_INTENSITY);
                effect.setFloat("vignette", VIGNETTE_INTENSITY);
                effect.setFloat("blur", BLUR_INTENSITY);
                effect.setVector2("screenSize", new BABYLON.Vector2(canvas.width, canvas.height));
            };

            const glBuilding = new BABYLON.GlowLayer("glBuilding", scene, { mainTextureFixedSize: 256 });
            glBuilding.intensity = BUILDING_GLOW_INTENSITY;
            const glStreets = new BABYLON.GlowLayer("glStreets", scene, { mainTextureFixedSize: 512 });
            glStreets.intensity = STREET_GLOW_INTENSITY;

            new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.8;
            const rootNode = new BABYLON.TransformNode("root", scene);
            rootNode.rotation.x = -Math.PI / 2; 
            rootNode.rotate(BABYLON.Axis.Z, (INITIAL_ROTATION_DEG * Math.PI) / 180, BABYLON.Space.LOCAL);
            rootNode.scaling.setAll(GLOBAL_SCALE);

            streetMat = new BABYLON.PBRMaterial("streetMat", scene);
            streetMat.unlit = true; streetMat.albedoColor = new BABYLON.Color3(0, 0, 0); 
            streetMat.emissiveColor = new BABYLON.Color3(0.3, 0.3, 0.3); streetMat.transparencyMode = 2;
            
            trailTexture = new BABYLON.DynamicTexture("trailTex", {width: 512, height: 64}, scene);
            const ctx = trailTexture.getContext();
            const ghostVal = Math.floor(STREET_GHOST_ALPHA * 255);
            ctx.fillStyle = `rgb(${ghostVal}, ${ghostVal}, ${ghostVal})`; ctx.fillRect(0, 0, 512, 64);
            const grad = ctx.createLinearGradient(0, 0, STREET_TRAIL_LENGTH, 0);
            grad.addColorStop(0, `rgba(255, 255, 255, ${STREET_GHOST_ALPHA})`); grad.addColorStop(1, "rgba(255, 255, 255, 1)"); 
            ctx.fillStyle = grad; ctx.fillRect(0, 0, STREET_TRAIL_LENGTH, 64);
            trailTexture.update(); trailTexture.uScale = STREET_TRAIL_DENSITY; trailTexture.wrapU = 1;
            streetMat.emissiveTexture = trailTexture; streetMat.opacityTexture = trailTexture; 

            const loadModel = (fileName, type) => {
                BABYLON.SceneLoader.ImportMesh("", "./", fileName, scene, (meshes) => {
                    meshes.forEach(mesh => {
                        if (mesh.name.includes("__root__")) return;
                        mesh.setParent(rootNode);
                        if (type === 'streets') { mesh.material = streetMat; glStreets.addIncludedOnlyMesh(mesh); }
                        else if (type === 'site') {
                            siteMat = new BABYLON.StandardMaterial("s", scene);
                            siteMat.wireframe = true; siteMat.emissiveColor = new BABYLON.Color3(1, 1, 1); 
                            siteMat.alpha = SITE_ALPHA; mesh.material = siteMat; glBuilding.addIncludedOnlyMesh(mesh);
                        } else if (type === 'mass') {
                            mesh.name = "MASS_GEOM"; glBuilding.addIncludedOnlyMesh(mesh);
                            const wire = mesh.clone("MASS_WIRE", rootNode);
                            const wMat = new BABYLON.StandardMaterial("w", scene);
                            wMat.wireframe = true; wMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
                            wMat.alpha = MASS_WIRE_ALPHA; wMat.zOffset = -1; wire.material = wMat;
                            wire.isPickable = false; glBuilding.addIncludedOnlyMesh(wire);
                        } else if (type === 'program') {
                            mesh.name = "PROG_GEOM";
                            if (mesh.material) { mesh.material.alpha = PROG_VOLUME_OPACITY; mesh.material.transparencyMode = 2; mesh.material.zOffset = 1; }
                            glBuilding.addIncludedOnlyMesh(mesh);
                            const pWire = mesh.clone("PROG_WIRE", rootNode);
                            const pwMat = new BABYLON.StandardMaterial("pw", scene);
                            pwMat.wireframe = true; pwMat.alpha = PROG_WIRE_ALPHA; pwMat.zOffset = -2; 
                            if (mesh.material && mesh.material.albedoColor) pwMat.emissiveColor = mesh.material.albedoColor;
                            pWire.material = pwMat; pWire.isPickable = false; glBuilding.addIncludedOnlyMesh(pWire);
                        }
                    });
                    if (type === 'program') updateVisibility(false); 
                });
            };

            const stackDiv = document.getElementById('label-stack');
            const sidebarDiv = document.getElementById('desc-sidebar');

            scene.onPointerObservable.add((pointerInfo) => {
                if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERMOVE) {
                    const pick = scene.pick(scene.pointerX, scene.pointerY);
                    stackDiv.innerHTML = ''; sidebarDiv.innerHTML = '';
                    customCursor.classList.remove('pulsing');

                    if (pick.hit) {
                        const m = pick.pickedMesh;
                        let label = "", desc = "", color = "#fff";
                        
                        if (!isProgramMode && (m.name === "MASS_GEOM" || m.name === "MASS_WIRE")) {
                            label = "BLACKROCK_SKIN"; desc = "A bridge between saving Earth and conquering Mars.";
                            customCursor.classList.add('pulsing');
                        } else if (isProgramMode && (m.name === "PROG_GEOM" || m.name === "PROG_WIRE")) {
                            const col = m.material.albedoColor || m.material.emissiveColor;
                            let match = FUNCTION_MAP.find(f => Math.abs(f.r - col.r) < 0.12 && Math.abs(f.g - col.g) < 0.12);
                            if (!match) match = FUNCTION_MAP[FUNCTION_MAP.length - 1];
                            label = match.label; desc = match.desc; color = `rgb(${col.r*255}, ${col.g*255}, ${col.b*255})`;
                        }
                        if (label) {
                            stackDiv.style.left = (scene.pointerX + 30) + 'px'; stackDiv.style.top = (scene.pointerY - 10) + 'px';
                            const itm = document.createElement('div'); itm.className='label-item'; 
                            itm.style.color=color; itm.style.borderColor=color; itm.innerText=label; stackDiv.appendChild(itm);
                            const ds = document.createElement('div'); ds.className='desc-item'; ds.style.color=color; ds.style.borderColor=color; ds.innerHTML=`<div class="desc-title">${label}</div>${desc}`; sidebarDiv.appendChild(ds);
                        }
                    }
                }
                if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERDOUBLETAP) {
                    const pickInfo = scene.pick(scene.pointerX, scene.pointerY);
                    if (pickInfo.hit && (pickInfo.pickedMesh.name.includes("MASS") || pickInfo.pickedMesh.name.includes("PROG"))) {
                        const anim = new BABYLON.Animation("z", "radius", 60, BABYLON.Animation.ANIMATIONTYPE_FLOAT);
                        anim.setKeys([{frame:0, value:camera.radius},{frame:30, value:DOUBLE_CLICK_ZOOM_LEVEL}]);
                        camera.animations = [anim]; scene.beginAnimation(camera, 0, 30, false);
                    }
                }
            });

            const updateVisibility = (toProg) => {
                isProgramMode = toProg;
                document.getElementById('btn-mass').classList.toggle('active', !toProg);
                document.getElementById('btn-program').classList.toggle('active', toProg);
                if (streetMat) streetMat.alpha = toProg ? PROG_MODE_STREET_ALPHA : 1.0;
                if (siteMat) siteMat.alpha = toProg ? PROG_MODE_SITE_ALPHA : SITE_ALPHA;
                scene.meshes.forEach(m => {
                    if (m.name === "MASS_GEOM") m.setEnabled(!toProg);
                    if (m.name.includes("PROG_")) m.setEnabled(toProg);
                    if (m.name === "MASS_WIRE") m.setEnabled(true);
                });
            };
            window.updateVisibility = updateVisibility;

            document.getElementById('btn-mass').onclick = () => updateVisibility(false);
            document.getElementById('btn-program').onclick = () => updateVisibility(true);
            loadModel("site.glb", "site"); loadModel("mass.glb", "mass"); loadModel("program.glb", "program"); loadModel("streets.glb", "streets");

            scene.registerBeforeRender(() => {
                rootNode.rotate(BABYLON.Axis.Z, 0.001, BABYLON.Space.LOCAL);
                if (trailTexture) { trailTexture.uOffset -= STREET_FLOW_SPEED; }
            });
            return scene;
        };

        const engine = new BABYLON.Engine(canvas, true);
        createScene(engine).then(scene => { engine.runRenderLoop(() => { scene.render(); }); });
        window.addEventListener("resize", () => { engine.resize(); });

        // ── REMOTE CONTROL LISTENER ──────────────────────────────
        window.addEventListener('message', (e) => {
            if (!e.data || e.data.source !== 'hyperobject-remote') return;
            const d = e.data;
            if (!camera) return;

            if (d.type === 'MOVE') {
                // Orbit: x = rotate azimuth, y = tilt elevation
                camera.alpha -= d.x * d.force * 0.04;
                camera.beta  += d.y * d.force * 0.04;
                camera.beta   = Math.max(0.1, Math.min(Math.PI - 0.1, camera.beta));
            }
            if (d.type === 'ROTATE') {
                // Gyro y axis = zoom
                camera.radius = Math.max(camera.lowerRadiusLimit || 5,
                    Math.min(camera.upperRadiusLimit || 500,
                    camera.radius - d.y * d.force * 2.0));
            }
            if (d.type === 'MODE' && window.updateVisibility) {
                window.updateVisibility(d.mode === 'program');
            }
        });
    </script>
</body>
</html>
