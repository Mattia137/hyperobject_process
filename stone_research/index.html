<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth-Mars Bridge - Stone Research Database</title>
    <meta name="description" content="Visual database: hierarchical tree diagram of geological samples and their processed patterns.">
    <!-- Link to the existing CSS file in the parent directory -->
    <link rel="stylesheet" href="../styles.css">
    <!-- Embed D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Diagram specific overrides and styling ensuring adherence to variables */
        body {





            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
        }

        #d3-container {
            width: 100vw;
            height: 100vh;
        }

        svg {
            font-family: 'Fragment Mono', monospace;
        }

        /* D3 Elements styling using CSS variables */
        .link {
            fill: none;
            stroke: var(--fg-dim);
            stroke-width: 1.5px;
            transition: stroke 0.3s, stroke-width 0.3s;
        }

        .link.highlight {
            stroke: var(--accent);
            stroke-width: 3px;
        }

        .node-card {
            fill: var(--bg);
            stroke: var(--fg-dim);
            stroke-width: 1px;
            transition: stroke 0.3s, stroke-width 0.3s;
        }

        .node.highlight .node-card {
            stroke: var(--accent);
            stroke-width: 2px;
        }

        .node-text {
            fill: var(--fg);
            font-family: 'Fragment Mono', monospace;
        }

        .node-title {
            font-weight: bold;
            font-size: 14px;
        }

        .node-subtitle {
            font-size: 10px;
            fill: var(--fg-dim);
        }

        .node-desc {
            font-size: 9px;
            fill: var(--fg);
        }

        .node-image-bg {
            fill: var(--bg); stroke: var(--fg-dim);

        }
    </style>
</head>
<body class="mode-diagram">
    <div id="d3-container"></div>
    <!-- Load the application logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
